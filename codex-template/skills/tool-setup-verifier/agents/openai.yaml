interface:
  display_name: "Tool Setup Verifier"
  short_description: "Smoke-check MDT tool adapters and workflow contracts"
  brand_color: "#0EA5E9"
  default_prompt: "Run a quick MDT smoke check. In the MDT repo, use verify-tool-setups.js plus the local smoke scripts. In an installed Codex setup, use ~/.codex/mdt/scripts/smoke-tool-setups.js and ~/.codex/mdt/scripts/smoke-codex-workflows.js instead, then summarize PASS/FAIL/SKIP with the next remediation step."
policy:
  allow_implicit_invocation: true
