# ModelDev Toolkit — Codex CLI Reference Configuration
#
# Copy this file to ~/.codex/config.toml to apply globally.
# Or keep it in your project root for project-level config.
#
# Docs: https://github.com/openai/codex

# Model selection
model = "gpt-5.3-codex"
model_provider = "openai"

# Permissions
[permissions]
# "untrusted" = no writes, "on-request" = ask per action, "never" = full auto
approval_policy = "on-request"
# "read-only", "workspace-write", "danger-full-access"
sandbox_mode = "workspace-write"

# Notifications (macOS) — notify is an array of shell command strings
notify = ["terminal-notifier -title 'Codex MDT' -message 'Task completed!' -sound default"]

# Persistent instructions applied to every session
instructions = """
Follow MDT principles:
1. Test-Driven Development (TDD) - write tests first, 80%+ coverage required
2. Immutability - always create new objects, never mutate
3. Security-First - validate all inputs, no hardcoded secrets
4. Conventional commits: feat|fix|refactor|docs|test|chore|perf|ci: description
5. File organization: many small files (200-400 lines, 800 max)
6. Error handling: handle at every level, never swallow errors
7. Input validation: schema-based validation at system boundaries
"""

# MCP Servers
# Codex supports command-based MCP servers
[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
startup_timeout_sec = 60

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 60

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
startup_timeout_sec = 60

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
startup_timeout_sec = 60

# Additional MCP servers (uncomment as needed):
# [mcp_servers.supabase]
# command = "npx"
# args = ["-y", "supabase-mcp-server@latest", "--read-only"]
#
# [mcp_servers.firecrawl]
# command = "npx"
# args = ["-y", "firecrawl-mcp"]
#
# [mcp_servers.railway]
# command = "npx"
# args = ["-y", "@anthropic/railway-mcp"]

# Features
web_search = "live"

# Profiles — switch with CODEX_PROFILE=<name>
[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"

[profiles.offline]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "disabled"
mcp_servers.github.enabled = false
mcp_servers.context7.enabled = false
mcp_servers.memory.enabled = false
mcp_servers.sequential-thinking.enabled = false

# Fallback for non-profile contexts:
# codex -c mcp_servers.github.enabled=false -c mcp_servers.context7.enabled=false -c mcp_servers.memory.enabled=false -c mcp_servers.sequential-thinking.enabled=false
